<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Oral Diagnoz AI | Web</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>
    <h1>Oral Diagnoz AI - Klinik Karar Destek</h1>
    <div id="input-area">
        <input type="text" id="yas" placeholder="Yaş Aralığı">
        <input type="text" id="semptom" placeholder="Semptomlar">
        <button py-click="analiz_et">Analizi Başlat</button>
    </div>
    <div id="results"></div>

    <section class="pyscript">
        <script type="py">
            import pandas as pd
            from pyscript import display, document

            # CSV verilerini burada tanımlayabilir veya fetch ile çekebilirsin
            def analiz_et(event):
                yas = document.querySelector("#yas").value
                # ... Senin arayuz.py içindeki mantığın buraya gelecek ...
                result_div = document.querySelector("#results")
                result_div.innerText = f"Analiz ediliyor: {yas}"
        </script>
    </section>
</body>
</html>
