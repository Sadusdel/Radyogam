<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Oral Diagnoz AI</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <py-config>
        packages = ["pandas"]
    </py-config>
</head>
<body>
    <h1>Oral Diagnoz AI Analiz Sistemi</h1>
    <div id="output"></div>

    <script type="py">
        import pandas as pd
        from pyscript import display

        # Test için bir dataframe oluşturalım
        data = {"Tanı": ["Kist", "Tümör"], "Olasılık": [85, 12]}
        df = pd.DataFrame(data)
        
        display(df, target="output")
    </script>
</body>
</html>
